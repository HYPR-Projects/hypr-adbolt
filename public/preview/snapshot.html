<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdBolt — Preview do anúncio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f4f4f5; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #222; }
    body { display: flex; flex-direction: column; }
    header {
      flex: 0 0 auto; background: #fff; border-bottom: 1px solid #e4e4e7;
      padding: 12px 18px; display: flex; align-items: center; gap: 12px; z-index: 5;
    }
    .logo { display: flex; align-items: center; gap: 7px; font-weight: 650; color: #18181b; font-size: 15px; white-space: nowrap; }
    .logo svg { color: #3397B9; }
    .meta { font-size: 12px; color: #71717a; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .meta .dims { font-family: ui-monospace, Menlo, monospace; background: #e9eef1; color: #3397B9; padding: 2px 8px; border-radius: 4px; }
    .meta a { color: #71717a; }
    .spacer { flex: 1; }
    .badge { font-size: 11px; color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 3px 9px; border-radius: 99px; }
    .badge.warn { color: #b45309; background: #fffbeb; border-color: #fde68a; }
    .frameWrap { flex: 1 1 auto; position: relative; min-height: 0; }
    iframe { width: 100%; height: 100%; border: 0; display: block; background: #fff; }
    #state { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #71717a; font-size: 14px; background: #f4f4f5; }
    #state.err { color: #a01010; }
    #state.hide { display: none; }
  </style>
</head>
<body>
  <header>
    <span class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      HYPR AdBolt
    </span>
    <span class="meta" id="meta"></span>
    <span class="spacer"></span>
    <span class="badge" id="badge" style="display:none"></span>
  </header>
  <div class="frameWrap">
    <div id="state">Carregando preview…</div>
    <iframe id="frame" title="preview do anúncio" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-storage-access-by-user-activation" referrerpolicy="no-referrer" style="display:none"></iframe>
  </div>

  <script>
    var SUPABASE_URL = 'https://adfnabuwzmojxbhcpdpe.supabase.co';
    var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZm5hYnV3em1vanhiaGNwZHBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTcxODcsImV4cCI6MjA5MTA5MzE4N30.sU9EZAnQ2mClIsMwfccR5__nbTYnfzkt3IvP-llxpno';

    var id = new URLSearchParams(location.search).get('id');
    var $ = function (s) { return document.getElementById(s); };
    function fail(msg) { var e = $('state'); e.textContent = msg || 'Preview não encontrado ou expirado.'; e.className = 'err'; }

    // Mount the live creative INSIDE the framed snapshot, from here (the player),
    // not from the serialized HTML. The frame is same-origin (the snapshot is
    // fetched and served through a blob: URL created by this page, and the frame
    // has allow-same-origin), so we can reach its document directly. Doing it
    // here is robust: a captured publisher page often contains escaped `</body>`
    // strings inside ad <iframe srcdoc> payloads, so injecting a hydrator script
    // into the serialized HTML before "</body>" could land it inside an ad blob
    // as inert text. Each slot carries data-adbolt-live-mode + -url; we lay a
    // live <iframe>/<video> over the frozen <img>, which stays as the backstop.
    function hydrateLive(frame) {
      var doc;
      try { doc = frame.contentDocument; } catch (e) { return; } // cross-origin fallback path: stay frozen
      if (!doc) return;
      var slots = doc.querySelectorAll('[data-adbolt-live-mode]');
      Array.prototype.forEach.call(slots, function (slot) {
        if (slot.querySelector('[data-adbolt-live]')) return; // already mounted
        var mode = slot.getAttribute('data-adbolt-live-mode');
        var liveUrl = slot.getAttribute('data-adbolt-live-url');
        if (!mode || !liveUrl) return;
        var frozen = slot.querySelector('[data-adbolt-creative]');
        try { if (frame.contentWindow.getComputedStyle(slot).position === 'static') slot.style.position = 'relative'; }
        catch (e) { slot.style.position = 'relative'; }
        var el;
        if (mode === 'video') {
          el = doc.createElement('video');
          el.src = liveUrl; el.controls = true; el.setAttribute('playsinline', ''); el.preload = 'metadata';
          if (frozen && frozen.src) el.poster = frozen.src;
          el.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:2;display:block';
          el.addEventListener('error', function () { try { el.remove(); } catch (x) {} });
        } else {
          el = doc.createElement('iframe');
          el.setAttribute('scrolling', 'no');
          el.setAttribute('allow', 'fullscreen; autoplay; clipboard-write');
          el.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
          // Cross-origin embed (Typeform widget / hosted html5 bundle).
          // allow-same-origin here lets the widget reach ITS own origin, not the
          // host snapshot, so there is no sandbox escape into the deliverable.
          el.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms allow-modals allow-storage-access-by-user-activation');
          el.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#fff;z-index:2';
          el.onerror = function () { try { el.remove(); } catch (x) {} };
          el.src = liveUrl;
        }
        el.setAttribute('data-adbolt-live', '1');
        slot.appendChild(el);
      });
    }

    (function load() {
      if (!id) return fail('Link inválido.');
      fetch(SUPABASE_URL + '/rest/v1/checkins?id=eq.' + encodeURIComponent(id) + '&select=*', {
        headers: { apikey: ANON, Authorization: 'Bearer ' + ANON },
      })
        .then(function (r) { return r.json(); })
        .then(function (rows) {
          if (!Array.isArray(rows) || !rows.length) return fail();
          var c = rows[0];
          var url = c.snapshot_url || c.screenshot_url;
          if (!url) return fail('Snapshot indisponível.');

          var host = c.page_url;
          try { host = new URL(c.page_url).hostname.replace(/^www\./, ''); } catch (e) {}
          var metaHtml = '<a href="' + c.page_url + '" target="_blank" rel="noopener">' + host + '</a>';
          if (c.creative_size) metaHtml += '<span>·</span><span class="dims">' + c.creative_size + '</span>';
          $('meta').innerHTML = metaHtml;
          document.title = 'Preview — ' + host;

          var sm = c.slots_meta;
          if (sm && typeof sm.filled === 'number') {
            var b = $('badge');
            if (sm.filled > 0) { b.textContent = sm.filled + (sm.filled === 1 ? ' slot preenchido' : ' slots preenchidos'); b.className = 'badge'; }
            else { b.textContent = 'nenhum slot detectado'; b.className = 'badge warn'; }
            b.style.display = 'inline-block';
          }

          var frame = $('frame');
          frame.onload = function () {
            $('state').className = 'hide';
            frame.style.display = 'block';
            // Mount live creatives once the framed snapshot has parsed. A tick
            // later too, in case slot layout settles after first paint.
            hydrateLive(frame);
            setTimeout(function () { hydrateLive(frame); }, 400);
          };
          frame.onerror = function () { fail('Erro ao carregar o snapshot.'); };
          // Supabase serves public HTML as text/plain (nosniff); fetch it and
          // render through a blob URL so the browser parses it as HTML.
          fetch(url)
            .then(function (rr) { return rr.text(); })
            .then(function (html) {
              var blobUrl = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
              frame.src = blobUrl;
            })
            .catch(function () { frame.src = url; });
        })
        .catch(function (err) { fail('Erro ao carregar: ' + (err && err.message || err)); });
    })();
  </script>
</body>
</html>
